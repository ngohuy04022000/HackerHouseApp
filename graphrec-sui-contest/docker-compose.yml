services:
  neo4j:
    image: neo4j:5.18-community
    container_name: graphrec_neo4j
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: ${NEO4J_AUTH:-neo4j/graphrec123}
      NEO4J_server_memory_heap_initial__size: 512m
      NEO4J_server_memory_heap_max__size: 1G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    healthcheck:
      test: [ "CMD-SHELL", "cypher-shell -u neo4j -p graphrec123 'RETURN 1' || exit 1" ]
      interval: 20s
      retries: 12
      start_period: 30s

  mysql:
    image: mysql:8.2
    container_name: graphrec_mysql
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-graphrec123}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-graphrec_db}
    volumes:
      - mysql_data:/var/lib/mysql
      - ./backend/sql/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: [ "CMD", "mysqladmin", "ping", "-h", "localhost", "-pgraphrec123" ]
      interval: 10s
      retries: 12
      start_period: 20s

  elasticsearch:
    image: elasticsearch:8.12.2
    container_name: graphrec_es
    ports:
      - "9200:9200"
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - es_data:/usr/share/elasticsearch/data
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1" ]
      interval: 15s
      retries: 12
      start_period: 30s

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: graphrec_backend
    ports:
      - "8000:8000"
    environment:
      NEO4J_URI: ${NEO4J_URI:-bolt://neo4j:7687}
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-graphrec123}
      MYSQL_HOST: ${MYSQL_HOST:-mysql}
      MYSQL_USER: ${MYSQL_USER:-root}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-graphrec123}
      MYSQL_DB: ${MYSQL_DB:-graphrec_db}
      ES_HOST: ${ES_HOST:-http://elasticsearch:9200}
      SUI_NETWORK: ${SUI_NETWORK:-testnet}
      SUI_PRIVATE_KEY: ${SUI_PRIVATE_KEY:-}
      SUI_ADMIN_ADDRESS: ${SUI_ADMIN_ADDRESS:-}
      SUI_PACKAGE_ID: ${SUI_PACKAGE_ID:-}
      SUI_POOL_ID: ${SUI_POOL_ID:-}
      SUI_REGISTRY_ID: ${SUI_REGISTRY_ID:-}
      SUI_ADMIN_CAP_ID: ${SUI_ADMIN_CAP_ID:-}
      SUI_TREASURY_ID: ${SUI_TREASURY_ID:-}
      SUI_PROFILE_ID: ${SUI_PROFILE_ID:-}
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
      mysql:
        condition: service_healthy
      elasticsearch:
        condition: service_healthy
    restart: on-failure

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: graphrec_frontend
    ports:
      - "5173:80"
    depends_on:
      - backend

volumes:
  neo4j_data:
  neo4j_logs:
  mysql_data:
  es_data:
